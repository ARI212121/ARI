<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מפת כתובות לפי אזורים</title>
    <script src="https://www.govmap.gov.il/govmap/api/govmap.api.js" defer onload="initGovMap()"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.9.0/proj4.min.js"></script>
    <style>
        /* המפה ממלאת את כל המסך ב-100% כדי לקבל איכות מקסימלית בייצוא */
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: Arial, sans-serif; }
        #map-container { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
        
        #loading { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            background: rgba(255,255,255,0.9); padding: 20px; border-radius: 8px; z-index: 2000;
            box-shadow: 0 0 10px rgba(0,0,0,0.2); text-align: center; font-size: 18px;
        }

        /* הפאנל הצף של הכפתורים - מרחף מעל המפה */
        #controls-panel {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(255, 255, 255, 0.95);
            padding: 15px 25px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
        }

        .row { display: flex; gap: 10px; align-items: center; }
        .zone-label { font-size: 18px; font-weight: bold; min-width: 150px; text-align: center; color: #333; }

        button {
            padding: 8px 16px; font-size: 14px; cursor: pointer; border-radius: 5px; 
            border: 1px solid #ccc; background-color: #fff; transition: background 0.2s;
        }
        button:hover { background-color: #e9e9e9; }
        
        .btn-primary { background-color: #0056b3; color: white; border: none; font-weight: bold;}
        .btn-primary:hover { background-color: #004494; }
        .btn-nav { background-color: #28a745; color: white; border: none; font-weight: bold;}
        .btn-nav:hover { background-color: #218838; }
        button:disabled { background-color: #cccccc; cursor: not-allowed; }
    </style>
</head>
<body>

    <div id="loading">טוען נתונים מהשרת... אנא המתן.</div>
    
    <div id="map-container"></div>
    
    <div id="controls-panel" style="display: none;">
        <div class="row">
            <button id="btn-next" class="btn-nav" onClick="changeZone(1)">אזור הבא ◀</button>
            <div id="zone-display" class="zone-label">אזור: --</div>
            <button id="btn-prev" class="btn-nav" onClick="changeZone(-1)">▶ אזור קודם</button>
        </div>
        <div class="row">
            <button class="btn-primary" onClick="exportMapImage()">💾 ייצא אזור לתמונה</button>
            <button onClick="showExample()">🖨️ הדפסה רגילה</button>
            <button onClick="closeExample()">❌ סגור תפריט הדפסה</button>
        </div>
    </div>

    <script>
        const gasWebAppUrl = "https://script.google.com/macros/s/AKfycbzsn50hfykXgjr2-_d1jUU1B7RAg8BsGRgE_fR3e-i5HI2LZtlUB1BUo6oIz9z3s4FD/exec";
        const govmapToken = "b0df1dbf-572e-474e-a6b3-9ef5676c1df9";

        proj4.defs("EPSG:2039", "+proj=tmerc +lat_0=31.73439361111111 +lon_0=35.20451694444445 +k=1.0000067 +x_0=219529.584 +y_0=626907.39 +ellps=GRS80 +towgs84=-48,55,52,0,0,0,0 +units=m +no_defs");

        let isGovMapLoaded = false;
        
        // משתנים גלובליים לניהול האזורים
        let allLocations = [];
        let uniqueZones = [];
        let currentZoneIndex = 0;

        function initGovMap() {
            isGovMapLoaded = true;
            govmap.createMap('map-container', {
                token: govmapToken,
                layers: [],
                showXY: true,
                background: "0",
                onLoad: function() {
                    startApp();
                }
            });
        }

        async function startApp() {
            if (!isGovMapLoaded) return; 

            try {
                const response = await fetch(gasWebAppUrl);
                const locations = await response.json();
                
                if(locations.error) throw new Error(locations.error);
                
                allLocations = locations;
                
                // שליפת כל האזורים הייחודיים מהנתונים
                const zonesSet = new Set();
                allLocations.forEach(loc => {
                    if (loc.zone) zonesSet.add(loc.zone.toString().trim());
                });
                
                uniqueZones = Array.from(zonesSet);
                
                // מיון האזורים למקרה שהם מספרים (כדי שאזור 2 יבוא לפני אזור 10)
                uniqueZones.sort((a, b) => {
                    const numA = parseInt(a);
                    const numB = parseInt(b);
                    if (!isNaN(numA) && !isNaN(numB)) return numA - numB;
                    return a.localeCompare(b);
                });

                if(uniqueZones.length > 0) {
                    document.getElementById('controls-panel').style.display = 'flex';
                    renderCurrentZone();
                } else {
                    document.getElementById('loading').innerText = "לא נמצאו נתונים תקינים.";
                }

            } catch (error) {
                console.error("שגיאה בטעינת הנתונים:", error);
                document.getElementById('loading').innerHTML = "אירעה שגיאה בטעינת הנתונים מהסקריפט.";
            }
        }

        // --- פעולות הדפסה ---
        function exportMapImage() { try { govmap.showExportMap(); } catch (err) {} }
        function showExample(){ govmap.showPrint(); }
        function closeExample(){ govmap.closePrint(); }

        // --- פונקציית ניווט בין אזורים ---
        function changeZone(direction) {
            const newIndex = currentZoneIndex + direction;
            if (newIndex >= 0 && newIndex < uniqueZones.length) {
                currentZoneIndex = newIndex;
                renderCurrentZone();
            }
        }

        function updateButtons() {
            document.getElementById('btn-prev').disabled = (currentZoneIndex === 0);
            document.getElementById('btn-next').disabled = (currentZoneIndex === uniqueZones.length - 1);
            document.getElementById('zone-display').innerText = "אזור: " + uniqueZones[currentZoneIndex];
        }

        // --- ציור האזור הנוכחי בלבד ---
        function renderCurrentZone() {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('loading').innerText = "טוען אזור " + uniqueZones[currentZoneIndex] + "...";
            updateButtons();

            const currentZoneName = uniqueZones[currentZoneIndex];
            const zoneLocations = allLocations.filter(loc => loc.zone.toString().trim() === currentZoneName);
            
            let wkts = [];
            let names = [];
            let tooltips = [];
            let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
            let validPointsCount = 0;

            for (let i = 0; i < zoneLocations.length; i++) {
                const loc = zoneLocations[i];
                if (loc.lat && loc.lng) {
                    try {
                        const itmCoords = proj4("EPSG:4326", "EPSG:2039", [parseFloat(loc.lng), parseFloat(loc.lat)]);
                        const x = Math.round(itmCoords[0]);
                        const y = Math.round(itmCoords[1]);

                        if (x > 130000 && x < 280000 && y > 380000 && y < 800000) {
                            if(x < minX) minX = x; 
                            if(x > maxX) maxX = x;
                            if(y < minY) minY = y; 
                            if(y > maxY) maxY = y;

                            wkts.push("POINT(" + x + " " + y + ")");
                            // שימוש בשם ייחודי לכל אזור כדי שגובמפס לא יתבלבל בין מחיקות
                            names.push("zone_" + currentZoneIndex + "_p" + i);
                            tooltips.push(loc.address);
                            validPointsCount++;
                        }
                    } catch (e) {}
                }
            }

            if (validPointsCount > 0) {
                const geometryParams = {
                    wkts: wkts,
                    names: names,
                    geometryType: 0,
                    defaultSymbol: {
                        url: 'https://maps.google.com/mapfiles/ms/icons/red-dot.png', 
                        width: 24,
                        height: 24
                    },
                    clearExistings: true, // מוחק אוטומטית את הנקודות של האזור הקודם!
                    data: { tooltips: tooltips }
                };

                govmap.displayGeometries(geometryParams).then(function() {
                    // ביצוע זום מדויק לפי גבולות האזור הנוכחי בלבד!
                    const marginX = Math.max((maxX - minX) * 0.1, 100); // 100 מטר שוליים מינימליים למקרה של נקודה אחת
                    const marginY = Math.max((maxY - minY) * 0.1, 100);
                    
                    govmap.zoomToExtent({ 
                        xmin: minX - marginX, 
                        ymin: minY - marginY, 
                        xmax: maxX + marginX, 
                        ymax: maxY + marginY 
                    });
                    
                    document.getElementById('loading').style.display = 'none';
                }).catch(function(err) {
                    console.error("שגיאה בציור של GovMap:", err);
                    document.getElementById('loading').style.display = 'none';
                });

            } else {
                document.getElementById('loading').style.display = 'none';
                alert("אין קואורדינטות תקינות לאזור זה.");
            }
        }
    </script>
</body>
</html>
