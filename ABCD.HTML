<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מפת כתובות לפי אזורים - מסך מלא</title>
    <script src="https://www.govmap.gov.il/govmap/api/govmap.api.js" defer onload="initGovMap()"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.9.0/proj4.min.js"></script>
    <style>
        /* איפוס מלא של הדף למסך שלם לטובת איכות צילום/ייצוא מקסימלית */
        body, html { 
            margin: 0; 
            padding: 0; 
            width: 100vw; 
            height: 100vh; 
            overflow: hidden; 
            font-family: Arial, sans-serif; 
        }
        
        #map-container { 
            width: 100%; 
            height: 100%; 
            position: absolute; 
            top: 0; 
            left: 0; 
            z-index: 1; 
        }
        
        #loading { 
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            background: rgba(255,255,255,0.95); 
            padding: 20px 40px; 
            border-radius: 8px; 
            z-index: 2000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); 
            text-align: center; 
            font-size: 20px;
            font-weight: bold;
        }

        /* סרגל ניווט תחתון שמרחף מעל המפה */
        #controls-panel {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(255, 255, 255, 0.95);
            padding: 15px 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            display: none; /* יוסתר עד שיטענו האזורים */
            flex-direction: column;
            gap: 15px;
            align-items: center;
        }

        .row { display: flex; gap: 15px; align-items: center; }
        .zone-label { font-size: 20px; font-weight: bold; min-width: 180px; text-align: center; color: #333; }

        button {
            padding: 10px 20px; font-size: 15px; cursor: pointer; border-radius: 6px; 
            border: 1px solid #ccc; background-color: #fff; transition: background 0.2s;
        }
        button:hover { background-color: #e9e9e9; }
        
        .btn-primary { background-color: #0056b3; color: white; border: none; font-weight: bold;}
        .btn-primary:hover { background-color: #004494; }
        
        .btn-nav { background-color: #28a745; color: white; border: none; font-weight: bold; font-size: 16px;}
        .btn-nav:hover { background-color: #218838; }
        button:disabled { background-color: #cccccc; cursor: not-allowed; opacity: 0.7;}
    </style>
</head>
<body>

    <div id="loading">טוען נתונים מהשרת... אנא המתן.</div>
    
    <div id="map-container"></div>
    
    <div id="controls-panel">
        <div class="row">
            <button id="btn-next" class="btn-nav" onClick="changeZone(1)">אזור הבא ◀</button>
            <div id="zone-display" class="zone-label">אזור: --</div>
            <button id="btn-prev" class="btn-nav" onClick="changeZone(-1)">▶ אזור קודם</button>
        </div>
        <div class="row">
            <button class="btn-primary" onClick="exportMapImage()">💾 ייצא אזור לתמונה (איכותית)</button>
            <button onClick="showExample()">🖨️ הדפס מפה</button>
            <button onClick="closeExample()">❌ סגור תפריטי הדפסה</button>
        </div>
    </div>

    <script>
        const gasWebAppUrl = "https://script.google.com/macros/s/AKfycbzsn50hfykXgjr2-_d1jUU1B7RAg8BsGRgE_fR3e-i5HI2LZtlUB1BUo6oIz9z3s4FD/exec";
        const govmapToken = "b0df1dbf-572e-474e-a6b3-9ef5676c1df9";

        proj4.defs("EPSG:2039", "+proj=tmerc +lat_0=31.73439361111111 +lon_0=35.20451694444445 +k=1.0000067 +x_0=219529.584 +y_0=626907.39 +ellps=GRS80 +towgs84=-48,55,52,0,0,0,0 +units=m +no_defs");

        let isGovMapLoaded = false;
        
        // משתנים גלובליים לניהול האזורים
        let allLocations = [];
        let uniqueZones = [];
        let currentZoneIndex = 0;

        function initGovMap() {
            isGovMapLoaded = true;
            govmap.createMap('map-container', {
                token: govmapToken,
                layers: [],
                showXY: true,
                background: "0",
                onLoad: function() {
                    startApp();
                }
            });
        }

        async function startApp() {
            if (!isGovMapLoaded) return; 

            try {
                const response = await fetch(gasWebAppUrl);
                const locations = await response.json();
                
                if(locations.error) throw new Error(locations.error);
                
                allLocations = locations;
                const zonesSet = new Set();
                
                // איסוף האזורים
                allLocations.forEach(loc => {
                    if (loc.zone !== undefined && loc.zone !== null && loc.zone !== "") {
                        zonesSet.add(loc.zone.toString().trim());
                    }
                });
                
                uniqueZones = Array.from(zonesSet);
                
                // התראת שגיאה למשתמש אם לא נמצאו אזורים בנתונים מגוגל
                if (uniqueZones.length === 0) {
                    alert("שימו לב: לא זוהו 'אזורים' בנתונים שמגיעים מגוגל. ייתכן שצריך לעשות 'פריסה מחדש' (New Deployment) לסקריפט או לבדוק את עמודת האזור.");
                    document.getElementById('loading').innerText = "לא נמצאו נתוני אזורים.";
                    return;
                }
                
                // מיון מספרי האזורים בסדר עולה
                uniqueZones.sort((a, b) => {
                    const numA = parseInt(a);
                    const numB = parseInt(b);
                    if (!isNaN(numA) && !isNaN(numB)) return numA - numB;
                    return a.localeCompare(b);
                });

                // הצגת הפאנל ותחילת ציור האזור הראשון
                document.getElementById('controls-panel').style.display = 'flex';
                renderCurrentZone();

            } catch (error) {
                console.error("שגיאה בטעינת הנתונים:", error);
                document.getElementById('loading').innerHTML = "אירעה שגיאה בטעינת הנתונים מהסקריפט.";
            }
        }

        function exportMapImage() { try { govmap.showExportMap(); } catch (err) {} }
        function showExample(){ govmap.showPrint(); }
        function closeExample(){ govmap.closePrint(); }

        function changeZone(direction) {
            const newIndex = currentZoneIndex + direction;
            if (newIndex >= 0 && newIndex < uniqueZones.length) {
                currentZoneIndex = newIndex;
                renderCurrentZone();
            }
        }

        function updateButtons() {
            document.getElementById('btn-prev').disabled = (currentZoneIndex === 0);
            document.getElementById('btn-next').disabled = (currentZoneIndex === uniqueZones.length - 1);
            document.getElementById('zone-display').innerText = "אזור: " + uniqueZones[currentZoneIndex];
        }

        function renderCurrentZone() {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('loading').innerText = "טוען אזור " + uniqueZones[currentZoneIndex] + "...";
            updateButtons();

            const currentZoneName = uniqueZones[currentZoneIndex];
            const zoneLocations = allLocations.filter(loc => loc.zone && loc.zone.toString().trim() === currentZoneName);
            
            let wkts = [];
            let names = [];
            let tooltips = [];
            let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
            let validPointsCount = 0;

            for (let i = 0; i < zoneLocations.length; i++) {
                const loc = zoneLocations[i];
                if (loc.lat && loc.lng) {
                    try {
                        const itmCoords = proj4("EPSG:4326", "EPSG:2039", [parseFloat(loc.lng), parseFloat(loc.lat)]);
                        const x = Math.round(itmCoords[0]);
                        const y = Math.round(itmCoords[1]);

                        if (x > 130000 && x < 280000 && y > 380000 && y < 800000) {
                            if(x < minX) minX = x; 
                            if(x > maxX) maxX = x;
                            if(y < minY) minY = y; 
                            if(y > maxY) maxY = y;

                            wkts.push("POINT(" + x + " " + y + ")");
                            names.push("zone_" + currentZoneIndex + "_p" + i);
                            tooltips.push(loc.address);
                            validPointsCount++;
                        }
                    } catch (e) {}
                }
            }

            if (validPointsCount > 0) {
                const geometryParams = {
                    wkts: wkts,
                    names: names,
                    geometryType: 0,
                    defaultSymbol: {
                        url: 'https://maps.google.com/mapfiles/ms/icons/red-dot.png', 
                        width: 24,
                        height: 24
                    },
                    clearExistings: true, // מנקה את הנקודות של האזור הקודם לפני ציור החדש
                    data: { tooltips: tooltips }
                };

                govmap.displayGeometries(geometryParams).then(function() {
                    // התמקדות לאזור הנוכחי
                    const marginX = Math.max((maxX - minX) * 0.1, 100);
                    const marginY = Math.max((maxY - minY) * 0.1, 100);
                    
                    govmap.zoomToExtent({ 
                        xmin: minX - marginX, 
                        ymin: minY - marginY, 
                        xmax: maxX + marginX, 
                        ymax: maxY + marginY 
                    });
                    
                    document.getElementById('loading').style.display = 'none';
                }).catch(function(err) {
                    console.error("שגיאה בציור:", err);
                    document.getElementById('loading').style.display = 'none';
                });

            } else {
                document.getElementById('loading').style.display = 'none';
                alert("אין קואורדינטות תקינות לאזור זה.");
            }
        }
    </script>
</body>
</html>
